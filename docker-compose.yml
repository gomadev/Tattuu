services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tatt-oo-backend
    environment:
      PORT: 3333
    ports:
      - "3333:3333"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3333/api/health"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - tatt-oo-net
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: "0.50"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3333
    container_name: tatt-oo-frontend
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - tatt-oo-net
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    cpus: "0.30"

  postgres:
    image: postgres:16-alpine
    container_name: tatt-oo-postgres
    environment:
      POSTGRES_DB: tattoo
      POSTGRES_USER: tattoo
      POSTGRES_PASSWORD: tattoo
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tattoo -d tattoo"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tatt-oo-net
    mem_limit: 512m
    cpus: "0.50"

  adminer:
    image: adminer:4
    container_name: tatt-oo-adminer
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tatt-oo-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: tatt-oo-cadvisor
    ports:
      - "8082:8080"
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped
    networks:
      - tatt-oo-net

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: tatt-oo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      cadvisor:
        condition: service_started
    networks:
      - tatt-oo-net

  grafana:
    image: grafana/grafana-oss:11.2.0
    container_name: tatt-oo-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - tatt-oo-net

volumes:
  pg_data:
  prometheus_data:
  grafana_data:

networks:
  tatt-oo-net:
    driver: bridge
